<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hamz Peripherals</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <header>
            <h1>hamz peripherals</h1>
        </header>

        <main>
            <section class="items">
                <div class="section-header">
                    <h2>mousepad</h2>
                    <hr>
                </div>
                <div class="card">
                    <img src="./perph-images/viper.jpg" alt="Razer Viper V3 Pro (White)">
                    <h3 class="brand">Razer</h3>
                    <p class="model">Viper V3 Pro (White)</p>
                </div>
            </section>

            <section class="items">
                <div class="section-header">
                    <h2>mousepad</h2>
                    <hr>
                </div>
                <div class="card">
                    <img src="./perph-images/type99.webp" alt="Artisan Type-99 (Matcha)">
                    <h3 class="brand">Artisan</h3>
                    <p class="model">Type-99 (Matcha)</p>
                </div>

                <div class="card">
                    <img src="./perph-images/atk-sky.webp" alt="Atk-Sky (Orange)">
                    <h3 class="brand">ATK</h3>
                    <p class="model">Sky (Orange)</p>
                </div>

                <div class="card">
                    <img src="./perph-images/fengling.jpeg" alt="ESPTiger Fengling (Pink)">
                    <h3 class="brand">ESPTiger</h3>
                    <p class="model">Fengling (Pink)</p>
                </div>

                <div class="card">
                    <img src="./perph-images/LGG-Saturn.webp" alt="LGG Saturn Pro(Red)">
                    <h3 class="brand">Lethal Gaming Gear</h3>
                    <p class="model">Saturn Pro (Red)</p>
                </div>

                <div class="card">
                    <img src="./perph-images/PMMC1P.webp" alt="PMM C1P (Black)">
                    <h3 class="brand">PMM</h3>
                    <p class="model">C1P (Black)</p>
                </div>
            </section>

        </main>
    </body>
</html>
